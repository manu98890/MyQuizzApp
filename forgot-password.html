<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Quiz App</title>
    <link rel="stylesheet" href="style.css"> 
    
    <style>
        /* Screenshot එකේ විදියට ලස්සන කරන්න අමතර Styles */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f4f8;
            margin: 0;
        }

        .login-container {
            background: white;
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            max-width: 400px;
            width: 90%;
            text-align: center;
        }

        input {
            background: #f8f9fa;
            border: 2px solid #f1f3f4;
            padding: 14px;
            border-radius: 12px;
            width: 100%;
            margin-bottom: 15px;
            outline: none;
            box-sizing: border-box;
        }

        input:focus {
            border-color: #1a73e8;
            background: white;
        }

        button {
            background: #1a73e8;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
        }

        button:hover {
            filter: brightness(1.1);
            transform: translateY(-2px);
        }

        .sidebar-link {
            display: inline-block;
            margin-top: 20px;
            color: #1a73e8;
            text-decoration: none;
            font-weight: 600;
        }

        #display-question {
            text-align: left;
            font-size: 14px;
            color: #2c3e50;
        }
    </style>
</head>
<body>

<div class="login-container">
    <h2 style="color: #1a73e8; margin-bottom: 10px;">මුරපදය අමතකද?</h2>
    <p style="font-size: 13px; color: #7f8c8d; margin-bottom: 25px;">ඔබේ ගිණුම තහවුරු කර රහස් ප්‍රශ්නයට පිළිතුරු දෙන්න.</p>
    
    <div id="step-1">
        <input type="email" id="user-email" placeholder="ඔබේ Email ලිපිනය ඇතුළත් කරන්න">
        <button onclick="checkUser()">ප්‍රශ්නය පෙන්වන්න</button>
    </div>

    <div id="step-2" style="display: none;">
        <div style="text-align: left; margin-bottom: 5px; font-weight: bold; font-size: 13px; color: #555;">ඔබේ රහස් ප්‍රශ්නය:</div>
        <p id="display-question" style="font-weight: 600; margin: 0 0 15px 0; padding: 12px; background: #f1f7ff; border-radius: 10px; border-left: 4px solid #1a73e8;"></p>
        <input type="text" id="user-answer" placeholder="පිළිතුර මෙතන ලියන්න">
        <button onclick="verifyAnswer()">මුරපදය ලබාගන්න</button>
    </div>

    <div id="step-3" style="display: none; margin-top: 10px;">
        <p style="color: #2ecc71; font-weight: 700; margin-bottom: 5px;">සාර්ථකයි! ඔබේ මුරපදය:</p>
        <div id="display-password" style="font-size: 22px; font-weight: 800; padding: 15px; border: 2px dashed #1a73e8; border-radius: 12px; background: #fff; color: #2c3e50;"></div>
        <a href="index.html" class="sidebar-link">← නැවත Login වෙන්න</a>
    </div>

    <div id="back-to-login">
        <a href="index.html" class="sidebar-link" style="font-size: 13px;">Login පිටුවට යන්න</a>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

<script>
    // 1. Firebase Configuration (ඔයාගේ එක මෙතනට දාන්න)
    const firebaseConfig = {
        apiKey: "AIzaSyAR6Lcx38Ld_fxn3D6xlZLc9j4VCJh7AJo",
        authDomain: "myquizapp-5bf05.firebaseapp.com",
        projectId: "myquizapp-5bf05",
        storageBucket: "myquizapp-5bf05.firebasestorage.app",
        messagingSenderId: "574891930589",
        appId: "1:574891930589:web:f9d6bdb96ecad822957c34"
    };

    // Initialize Firebase
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.firestore();

    // --- 🔑 FORGOT PASSWORD LOGIC ---

    function checkUser() {
        console.log("Button clicked!"); // මේක Console එකේ පේනවද බලන්න
        const email = document.getElementById('user-email').value.trim();
        
        if(!email) {
            alert("කරුණාකර Email එක ඇතුළත් කරන්න.");
            return;
        }

        console.log("Checking email in Firestore:", email);

        db.collection("users").where("email", "==", email).get()
        .then((querySnapshot) => {
            if (!querySnapshot.empty) {
                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    console.log("User data found:", data);

                    if(data.securityQuestion) {
                        document.getElementById('display-question').innerText = data.securityQuestion;
                        document.getElementById('step-1').style.display = 'none';
                        document.getElementById('step-2').style.display = 'block';
                        
                        window.correctAnswer = data.answer.toLowerCase();
                        window.userPassword = data.password;
                    } else {
                        alert("මෙම ගිණුම සඳහා රහස් ප්‍රශ්නයක් සකසා නැත.");
                    }
                });
            } else {
                alert("මෙම Email ලිපිනයෙන් ගිණුමක් සොයාගත නොහැක.");
            }
        })
        .catch(err => {
            console.error("Firestore Error:", err);
            alert("Error: " + err.message);
        });
    }

    function verifyAnswer() {
        const userAnswer = document.getElementById('user-answer').value.trim().toLowerCase();

        if (userAnswer === window.correctAnswer) {
            document.getElementById('step-2').style.display = 'none';
            document.getElementById('step-3').style.display = 'block';
            document.getElementById('display-password').innerText = window.userPassword;
        } else {
            alert("පිළිතුර වැරදියි! කරුණාකර නැවත උත්සාහ කරන්න.");
        }
    }
</script>
</body>
</html>
</body>
</html>
